name: Materialize recovered source

on:
  push:
    branches: [main]
    paths:
      - '.recovery/**'
      - '.github/workflows/materialize-recovery.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reassemble and verify recovery archive
        shell: bash
        run: |
          set -euo pipefail
          cat .recovery/part-* > /tmp/life-os.tar.gz.b64
          base64 --decode /tmp/life-os.tar.gz.b64 > /tmp/life-os.tar.gz
          echo "419f5a97add6bed20d724eba25ed34ec1c8be87ad95c250d6fed2a9f00dbf106  /tmp/life-os.tar.gz" | sha256sum -c -

      - name: Restore full application source
        shell: bash
        run: |
          set -euo pipefail
          tar -xzf /tmp/life-os.tar.gz -C .
          rm -rf .recovery
          rm -f .github/workflows/materialize-recovery.yml

      - name: Commit restored source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Materialize recovered LIFE OS source"
          git push
